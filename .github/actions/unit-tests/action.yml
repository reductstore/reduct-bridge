name: 'Run Unit Tests'
description: 'Downloads and runs unit test binaries for a given target.'
inputs:
  os:
    description: 'Operating system.'
    required: true
  target:
    description: 'Target triple.'
    required: true
  ros-setup-script:
    description: 'Optional ROS setup script to source before running tests.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: reduct-bridge-tests-${{ inputs.target }}
        path: ./tmp/tests

    - name: Run tests
      shell: bash
      run: |
        set -e -x
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        for f in ./tmp/tests/*; do
          # exclude proc-macro helper crates that are not directly executable tests
          if [[ $f == *"reduct_macros"* ]]; then
            continue
          fi
          chmod +x $f
          $f --nocapture
        done
