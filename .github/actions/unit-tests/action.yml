name: 'Run Unit Tests'
description: 'Downloads and runs unit test binaries for a given target.'
inputs:
  os:
    description: 'Operating system.'
    required: true
  target:
    description: 'Target triple.'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: reduct-bridge-tests-${{ inputs.target }}
        path: ./tmp/tests

    - name: Run tests
      shell: bash
      run: |
        set -e -x
        for f in ./tmp/tests/*; do
          # exclude proc-macro helper crates that are not directly executable tests
          if [[ $f == *"reduct_macros"* ]]; then
            continue
          fi
          chmod +x $f
          $f --nocapture
        done

    - name: Run Docker-backed CI feature tests (Linux only)
      if: ${{ startsWith(inputs.os, 'ubuntu-') }}
      shell: bash
      run: |
        set -e -x
        cargo test --features ci docker_reductstore_roundtrip_data_and_attachment -- --nocapture
