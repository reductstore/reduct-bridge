name: 'Build and Publish Snap Package'
description: 'Builds reduct-bridge snap variants and publishes them to the Snap Store channels.'
inputs:
  variant:
    description: 'Build variant track (ros1 or ros2).'
    required: true
  publish_channel:
    description: 'Snap channel to publish into (edge or stable).'
    required: true
  snapcraft_store_credentials:
    description: 'Snapcraft store credentials.'
    required: false
  upload_artifact:
    description: 'Upload built snap as workflow artifact.'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Resolve snap package inputs
      shell: bash
      run: |
        set -euo pipefail

        case "${{ inputs.variant }}" in
          ros1)
            echo "SNAP_TITLE=ReductBridge for ROS1" >> "$GITHUB_ENV"
            echo "SNAP_NAME=reduct-bridge-ros1" >> "$GITHUB_ENV"
            echo "BINARY_ARTIFACT=bridge-ros1-x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
            ;;
          ros2)
            echo "SNAP_TITLE=ReductBridge for ROS2" >> "$GITHUB_ENV"
            echo "SNAP_NAME=reduct-bridge-ros2" >> "$GITHUB_ENV"
            echo "BINARY_ARTIFACT=bridge-ros2-humble-x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
            ;;
          *)
            echo "Unsupported variant: ${{ inputs.variant }}"
            exit 1
            ;;
        esac

    - name: Download binary artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.BINARY_ARTIFACT }}
        path: .snap-build/bin

    - name: Prepare snap payload files
      shell: bash
      run: |
        set -euo pipefail
        chmod +x .snap-build/bin/reduct-bridge
        chmod +x snap/local/start-daemon.sh
        chmod +x snap/hooks/install

    - name: Install snapcraft
      shell: bash
      run: |
        set -euo pipefail
        sudo snap install snapcraft --classic

    - name: Generate snapcraft manifest
      env:
        SNAP_NAME: ${{ env.SNAP_NAME }}
        SNAP_TITLE: ${{ env.SNAP_TITLE }}
      shell: bash
      run: |
        set -euo pipefail
        python - <<'PY'
        import os
        from pathlib import Path
        import re
        import textwrap

        readme = Path('README.md').read_text()
        match = re.search(r'^(ReductBridge bridges .+)$', readme, flags=re.M)
        if not match:
          raise SystemExit("Could not find ReductBridge summary line in README.md")

        snap_name = os.environ["SNAP_NAME"]
        snap_title = os.environ["SNAP_TITLE"]
        description = match.group(1).strip()
        summary = textwrap.shorten(description, width=78, placeholder='...')
        indented_description = description.replace('\n', '\n  ')

        template = Path('.github/actions/snap-release/snapcraft.template.yaml').read_text()
        text = template.replace('__SNAP_TITLE__', snap_title)
        text = text.replace('__SNAP_NAME__', snap_name)
        text = text.replace('__SNAP_SUMMARY__', summary)
        text = text.replace('__SNAP_DESCRIPTION__', indented_description)
        Path('snap/snapcraft.yaml').write_text(text)
        PY

    - name: Print generated snapcraft manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "--- snap/snapcraft.yaml ---"
        sed -n '1,240p' snap/snapcraft.yaml

    - name: Build snap
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p snapcraft-logs
        LOG_FILE="snapcraft-logs/build-${{ inputs.variant }}.log"
        if ! snapcraft pack --destructive-mode 2>&1 | tee "$LOG_FILE"; then
          cp -a "$HOME/.local/state/snapcraft/log/." snapcraft-logs/ 2>/dev/null || true
          exit 1
        fi

    - name: Lint snap
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p snapcraft-logs
        SNAP_FILE=$(ls *.snap)
        LOG_FILE="snapcraft-logs/lint-${{ inputs.variant }}.log"
        if ! snapcraft lint "$SNAP_FILE" 2>&1 | tee "$LOG_FILE"; then
          cp -a "$HOME/.local/state/snapcraft/log/." snapcraft-logs/ 2>/dev/null || true
          exit 1
        fi

    - name: Rename artifact with variant
      env:
        SNAP_NAME: ${{ env.SNAP_NAME }}
      shell: bash
      run: |
        set -euo pipefail
        SNAP_FILE=$(ls *.snap)
        RENAMED_FILE="${SNAP_NAME}.snap"
        mv "$SNAP_FILE" "$RENAMED_FILE"
        echo "SNAP_FILE=$RENAMED_FILE" >> "$GITHUB_ENV"

    - name: Upload artifact
      if: inputs.upload_artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.SNAP_NAME }}.snap
        path: ${{ env.SNAP_FILE }}

    - name: Upload snapcraft logs on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4
      with:
        name: snapcraft-logs-${{ inputs.variant }}
        path: snapcraft-logs
        if-no-files-found: ignore

    - name: Publish to Snap Store
      shell: bash
      env:
        SNAPCRAFT_STORE_CREDENTIALS: ${{ inputs.snapcraft_store_credentials }}
      run: |
        set -euo pipefail

        if [ -z "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
          echo "Snap Store credentials missing; skipping publish"
          exit 0
        fi

        snapcraft upload --release="${{ inputs.publish_channel }}" "$SNAP_FILE"
