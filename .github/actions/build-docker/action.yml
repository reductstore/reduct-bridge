name: 'Build Docker Image'
description: 'Builds Linux Docker image from prebuilt artifacts and uploads it.'
inputs:
  platform:
    description: 'Docker platform (linux/amd64, linux/arm64, linux/arm/v7).'
    required: true
  target:
    description: 'Rust target triple.'
    required: true
  bridge_artifact_name:
    description: 'Artifact name containing the reduct-bridge binary.'
    required: false
    default: ''
  image_artifact_name:
    description: 'Artifact name for exported image tar.'
    required: false
    default: image
  image_tag:
    description: 'Tag used for docker export.'
    required: true
  docker_labels:
    description: 'Optional docker labels.'
    required: false
    default: ''
  build_outputs:
    description: 'Outputs for docker/build-push-action.'
    required: false
    default: type=docker,dest=/tmp/image.tar
  upload_artifact:
    description: 'Upload /tmp/image.tar as artifact.'
    required: false
    default: 'true'
outputs:
  digest:
    description: 'Image digest from docker/build-push-action.'
    value: ${{ steps.build.outputs.digest }}
runs:
  using: 'composite'
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.bridge_artifact_name != '' && inputs.bridge_artifact_name || format('reduct-bridge-{0}', inputs.target) }}
        path: /tmp/reduct-bridge/

    - name: Download reduct-cli from latest release
      shell: bash
      run: |
        set -euo pipefail
        target="${{ inputs.target }}"
        ext="tar.gz"
        if [[ "$target" == *windows* ]]; then
          ext="zip"
        fi
        asset_name="reduct-cli.${target}.${ext}"
        asset_url="https://github.com/reductstore/reduct-cli/releases/latest/download/${asset_name}"

        mkdir -p /tmp/reduct-cli
        wget -q -O "/tmp/${asset_name}" "$asset_url"
        echo "Downloaded ${asset_name} from ${asset_url}"

        if [ "$ext" = "zip" ]; then
          unzip -q "/tmp/${asset_name}" -d /tmp/reduct-cli
        else
          tar -xzf "/tmp/${asset_name}" -C /tmp/reduct-cli
        fi

        REDUCT_CLI_BIN="$(find /tmp/reduct-cli -type f -name reduct-cli | head -n 1)"
        if [ -z "$REDUCT_CLI_BIN" ]; then
          echo "reduct-cli binary not found in extracted archive /tmp/${asset_name}"
          find /tmp/reduct-cli -maxdepth 3 -type f -print || true
          exit 1
        fi
        chmod +x "$REDUCT_CLI_BIN"

    - name: Prepare docker build context from artifacts
      shell: bash
      run: |
        set -euo pipefail
        REDUCT_BRIDGE_BIN="$(find /tmp/reduct-bridge -type f -name reduct-bridge | head -n 1)"
        if [ -z "$REDUCT_BRIDGE_BIN" ]; then
          echo "reduct-bridge binary not found in /tmp/reduct-bridge"
          exit 1
        fi
        REDUCT_CLI_BIN="$(find /tmp/reduct-cli -type f -name reduct-cli | head -n 1)"
        if [ -z "$REDUCT_CLI_BIN" ]; then
          echo "reduct-cli binary not found in /tmp/reduct-cli"
          exit 1
        fi

        rm -rf .image-build
        mkdir -p .image-build/usr/local/bin .image-build/data
        install -m 0755 "$REDUCT_BRIDGE_BIN" .image-build/usr/local/bin/reduct-bridge
        install -m 0755 "$REDUCT_CLI_BIN" .image-build/usr/local/bin/reduct-cli

    - name: Verify build context binaries
      shell: bash
      run: |
        set -euo pipefail
        test -x .image-build/usr/local/bin/reduct-bridge
        test -x .image-build/usr/local/bin/reduct-cli
        ls -l .image-build/usr/local/bin/reduct-bridge .image-build/usr/local/bin/reduct-cli

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and export
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: buildx.Dockerfile
        tags: ${{ inputs.image_tag }}
        platforms: ${{ inputs.platform }}
        labels: ${{ inputs.docker_labels }}
        outputs: ${{ inputs.build_outputs }}

    - name: Upload artifact
      if: ${{ inputs.upload_artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.image_artifact_name }}
        path: /tmp/image.tar
