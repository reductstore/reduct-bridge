name: 'Generate Code Coverage'
description: 'Downloads and runs test binaries with coverage instrumentation for a given target.'
inputs:
  os:
    description: 'Operating system.'
    required: true
  target:
    description: 'Target triple.'
    required: true
  action_github_token:
    description: 'GitHub token for authentication.'
    required: true
  cargo-args:
    description: 'Additional cargo arguments such as feature flags.'
    required: false
    default: ''
  ros-setup-script:
    description: 'Optional ROS setup script to source before cargo commands.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      shell: bash
      run: rustup update stable

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run Docker-backed ReductStore test (CI feature)
      shell: bash
      env:
        CARGO_TERM_COLOR: always
        RUST_LOG: debug
      run: |
        set -e -x
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        cargo test ${{ inputs.cargo-args }} docker_reductstore_roundtrip_data_and_attachment -- --nocapture

    - name: Run code coverage
      shell: bash
      env:
        CARGO_TERM_COLOR: always
        RUST_LOG: debug
      run: |
        set -e -x
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        cargo llvm-cov --workspace ${{ inputs.cargo-args }} --lcov --output-path lcov.info

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: lcov.info
        path: lcov.info
