name: 'Build Binaries'
description: 'Builds binaries for a specific target and uploads them as artifacts.'
inputs:
  minimal_rust_version:
    description: 'Minimal Rust version.'
    required: true
  action_github_token:
    description: 'GitHub token for setup-protoc.'
    required: true
  target:
    description: 'Target triple.'
    required: true
  os:
    description: 'Operating system.'
    required: true
  compiler:
    description: 'Compiler package name.'
    required: true
  access-key-id:
    description: 'AWS Access Key ID'
    required: true
  secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  cargo-args:
    description: 'Additional cargo arguments such as feature flags.'
    required: false
    default: ''
  ros-setup-script:
    description: 'Optional ROS setup script to source before cargo commands.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.minimal_rust_version }}

    - name: Install toolchain
      shell: bash
      run: rustup target add ${{ inputs.target }}

    - name: Install gcc
      if: ${{ startsWith(inputs.os, 'ubuntu-') }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ inputs.compiler }}

    - name: Install gcc
      if: ${{ startsWith(inputs.os, 'macos-') && inputs.compiler != '' }}
      shell: bash
      run: |
        brew install ${{ inputs.compiler }}

    - name: AWS Credentials and Cargo Cache
      uses: ./.github/actions/aws-cargo-cache
      with:
        target: ${{ inputs.target }}
        profile: ${{ github.event_name == 'pull_request' && 'ci' || 'release' }}
        access-key-id: ${{ inputs.access-key-id }}
        secret-access-key: ${{ inputs.secret-access-key }}

    - name: Install cargo-export
      shell: bash
      run: cargo install cargo-export --force

    - name: Build binary (PR)
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        cargo build --profile ci -p reduct-bridge --target ${{ inputs.target }} ${{ inputs.cargo-args }}

    - name: Upload binary (PR)
      uses: actions/upload-artifact@v4
      # Only upload Linux binary for PRs for sanity test
      if: github.event_name == 'pull_request' && inputs.target == 'x86_64-unknown-linux-gnu'
      with:
        name: reduct-bridge-${{ inputs.target }}
        path: target/${{inputs.target}}/ci/reduct-bridge
        if-no-files-found: 'error'

    - name: Build binary (Release)
      if: github.event_name != 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        cargo build --locked --profile release -p reduct-bridge --target ${{ inputs.target }} ${{ inputs.cargo-args }}


    - name: Upload binary (Release)
      uses: actions/upload-artifact@v4
      if: github.event_name != 'pull_request'
      with:
        name: reduct-bridge-${{ inputs.target }}
        path: target/${{inputs.target}}/release/reduct-bridge${{ inputs.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}
        if-no-files-found: 'error'


    - name: Build and export tests (PR)
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        cargo export target/${{ inputs.target }}/tests -- test --profile ci --target ${{ inputs.target }} --bins ${{ inputs.cargo-args }}

    - name: Build and export tests (Release)
      if: github.event_name != 'pull_request'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.ros-setup-script }}" ]]; then
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source "${{ inputs.ros-setup-script }}"
        fi
        cargo export target/${{ inputs.target }}/tests -- test --profile release --target ${{ inputs.target }} --bins ${{ inputs.cargo-args }}

    - name: Upload tests
      uses: actions/upload-artifact@v4
      with:
        name: reduct-bridge-tests-${{ inputs.target }}
        path: target/${{ inputs.target }}/tests
