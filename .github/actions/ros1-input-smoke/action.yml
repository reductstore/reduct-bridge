name: "ROS1 Input Smoke Test"
description: "Runs reduct-bridge against ROS1 publishers and validates ReductStore records and labels."
inputs:
  bridge_binary:
    description: "Path to reduct-bridge binary"
    required: true
runs:
  using: "composite"
  steps:
    - name: Run ROS1 smoke test
      shell: bash
      run: |
        set -euo pipefail

        BRIDGE_BIN="${{ inputs.bridge_binary }}"
        REDUCT_CONTAINER="reduct-store-it"
        ROS_CONTAINER="ros-master-it"
        REDUCT_URL="http://127.0.0.1:18383"
        BUCKET="ros-it"
        ALIAS="it"
        EXPORT_DIR="/tmp/ros-it-export"
        BRIDGE_CFG="${GITHUB_WORKSPACE}/.github/configs/ros1_input_it.toml"
        BRIDGE_LOG="/tmp/reduct-bridge-it.log"

        rm -f /tmp/reduct-bridge-it.pid "$BRIDGE_LOG"
        docker rm -f "$ROS_CONTAINER" >/dev/null 2>&1 || true
        docker rm -f "$REDUCT_CONTAINER" >/dev/null 2>&1 || true

        echo "=== [ros1-it] Starting ReductStore in debug mode ==="
        docker run -d --rm --name "$REDUCT_CONTAINER" \
          -e RS_LOG_LEVEL=DEBUG \
          -p 18383:8383 \
          reduct/store:main

        echo "=== [ros1-it] Waiting for ReductStore health ==="
        for _ in $(seq 1 30); do
          if curl -sf "${REDUCT_URL}/api/v1/alive" >/dev/null; then
            echo "=== [ros1-it] ReductStore is alive ==="
            break
          fi
          sleep 1
        done

        echo "=== [ros1-it] Downloading reduct-cli ==="
        asset="reduct-cli.x86_64-unknown-linux-gnu.tar.gz"
        url="https://github.com/reductstore/reduct-cli/releases/latest/download/${asset}"
        wget -q -O "/tmp/${asset}" "$url"
        tar -xzf "/tmp/${asset}" -C /tmp
        chmod +x /tmp/reduct-cli

        echo "=== [ros1-it] Preparing alias and bucket ==="
        /tmp/reduct-cli alias rm "$ALIAS" >/dev/null 2>&1 || true
        /tmp/reduct-cli alias add "$ALIAS" --url "$REDUCT_URL"
        /tmp/reduct-cli bucket create "$ALIAS/$BUCKET" >/dev/null 2>&1 || true

        echo "=== [ros1-it] Starting ROS1 master ==="
        docker run -d --rm --name "$ROS_CONTAINER" --network host ros:noetic-ros-base roscore
        sleep 5

        echo "=== [ros1-it] Starting reduct-bridge in debug mode ==="
        chmod +x "$BRIDGE_BIN"
        RUST_LOG=debug "$BRIDGE_BIN" "$BRIDGE_CFG" >"$BRIDGE_LOG" 2>&1 &
        BRIDGE_PID=$!
        echo "$BRIDGE_PID" >/tmp/reduct-bridge-it.pid
        sleep 4

        echo "=== [ros1-it] Publishing ROS messages ==="
        docker run --rm --network host \
          -v "${GITHUB_WORKSPACE}/.github/scripts:/scripts:ro" \
          ros:noetic-ros-base \
          python3 /scripts/ros1_publish.py --count 8 --period 0.2

        echo "=== [ros1-it] Stopping bridge and waiting for flush ==="
        sleep 2
        kill -INT "$BRIDGE_PID"
        wait "$BRIDGE_PID"
        rm -f /tmp/reduct-bridge-it.pid

        echo "=== [ros1-it] Exporting records from ReductStore ==="
        rm -rf "$EXPORT_DIR"
        mkdir -p "$EXPORT_DIR"
        /tmp/reduct-cli cp "$ALIAS/$BUCKET" "$EXPORT_DIR" -n camera-raw -l 5 -m

        meta_count="$(find "$EXPORT_DIR/camera-raw" -type f -name '*-meta.json' | wc -l | tr -d ' ')"
        if [[ "$meta_count" -lt 1 ]]; then
          echo "No camera-raw records exported"
          exit 1
        fi

        first_meta="$(find "$EXPORT_DIR/camera-raw" -type f -name '*-meta.json' | head -n 1)"
        if [[ -z "$first_meta" ]]; then
          echo "No metadata file found for camera-raw records"
          exit 1
        fi
        if ! jq -e '.labels.x != null and (.labels.x | tostring | length > 0)' "$first_meta" >/dev/null; then
          echo "Missing x label in exported camera-raw metadata:"
          cat "$first_meta"
          exit 1
        fi
        echo "=== [ros1-it] Verification passed: camera-raw has x label ==="

    - name: Print reduct-bridge logs
      if: ${{ always() }}
      shell: bash
      run: |
        echo "=== [ros1-it] Final logs: reduct-bridge ==="
        if [[ -f /tmp/reduct-bridge-it.log ]]; then
          cat /tmp/reduct-bridge-it.log || true
        else
          echo "bridge log file not found: /tmp/reduct-bridge-it.log"
        fi

    - name: Print reductstore logs
      if: ${{ always() }}
      shell: bash
      run: |
        echo "=== [ros1-it] Final logs: reductstore ==="
        docker logs reduct-store-it || true
