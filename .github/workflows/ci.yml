name: Build, Test and Release
on:
  push:
    branches: [ main, stable ]
    tags:
      - "v*"
    paths-ignore:
      - docs/**
      - README.md
      - CHANGELOG.md

  pull_request:
    paths-ignore:
      - docs/**
      - README.md
      - CHANGELOG.md

permissions:
  id-token: write
  contents: read


env:
  REGISTRY_IMAGE: reduct/bridge
  AWS_LC_SYS_USE_PREBUILT: 0

jobs:
  rust_fmt:
    runs-on: ubuntu-latest
    name: Rust Linter
    steps:
      - uses: actions/checkout@v4
      - name: Check code
        run: cargo fmt --all -- --check

  build_binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs:
      - rust_fmt
    strategy:
      matrix:
        target:
              [
                "x86_64-unknown-linux-gnu",
                "aarch64-unknown-linux-gnu",
                "armv7-unknown-linux-gnueabihf",
                "x86_64-pc-windows-gnu",
                "x86_64-apple-darwin",
                "aarch64-apple-darwin",
              ]
        include:
          - target: "x86_64-unknown-linux-gnu"
            os: ubuntu-24.04
            compiler: "gcc"
            cargo_args: "--no-default-features --features all-inputs"
            ros_setup_script: "/opt/ros/jazzy/setup.bash"
          - target: "aarch64-unknown-linux-gnu"
            os: ubuntu-22.04
            compiler: "gcc-aarch64-linux-gnu"
            cargo_args: ""
            ros_setup_script: ""
          - target: "armv7-unknown-linux-gnueabihf"
            os: ubuntu-22.04
            compiler: "gcc-arm-linux-gnueabihf"
            cargo_args: ""
            ros_setup_script: ""
          - target: "x86_64-pc-windows-gnu"
            os: ubuntu-22.04
            compiler: "gcc-mingw-w64-x86-64"
            cargo_args: ""
            ros_setup_script: ""
          - target: "x86_64-apple-darwin"
            os: macos-14
            compiler: ""
            cargo_args: ""
            ros_setup_script: ""
          - target: "aarch64-apple-darwin"
            os: macos-14
            compiler: ""
            cargo_args: ""
            ros_setup_script: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install ROS2
        if: ${{ matrix.ros_setup_script != '' }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install ROS2 interface packages
        if: ${{ matrix.ros_setup_script != '' }}
        run: sudo apt-get update && sudo apt-get install -y ros-jazzy-example-interfaces ros-jazzy-test-msgs
      - uses: ./.github/actions/build-binaries
        with:
          minimal_rust_version: ${{ vars.MINIMAL_RUST_VERSION }}
          action_github_token: ${{ secrets.ACTION_GITHUB_TOKEN }}
          target: ${{ matrix.target }}
          os: ${{ matrix.os }}
          compiler: ${{ matrix.compiler }}
          access-key-id: ${{ secrets.S3_CACHE_ACCESS_KEY }}
          secret-access-key: ${{ secrets.S3_CACHE_SECRET_KEY }}
          cargo-args: ${{ matrix.cargo_args }}
          ros-setup-script: ${{ matrix.ros_setup_script }}

  unit_tests:
    name: Run Unit Tests
    needs:
      - rust_fmt
      - build_binaries
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      RUST_BACKTRACE: 1
      RUST_LOG: debug
    steps:
      - uses: actions/checkout@v4
      - name: Install ROS2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install ROS2 interface packages
        run: sudo apt-get update && sudo apt-get install -y ros-jazzy-example-interfaces ros-jazzy-test-msgs
      - uses: ./.github/actions/unit-tests
        with:
          os: ubuntu-24.04
          target: x86_64-unknown-linux-gnu
          ros-setup-script: /opt/ros/jazzy/setup.bash

  ros1_input_integration:
    name: ROS1 Input Integration
    needs:
      - rust_fmt
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build ROS1 bridge binary
        run: cargo build --profile ci --no-default-features --features ros1

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: ./.github/actions/ros1-input-smoke
        with:
          bridge_binary: ./target/ci/reduct-bridge

  shell_input_integration:
    name: Shell Input Integration
    needs:
      - rust_fmt
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build shell bridge binary
        run: cargo build --profile ci --no-default-features --features shell

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: ./.github/actions/shell-input-smoke
        with:
          bridge_binary: ./target/ci/reduct-bridge

  ros2_input_integration:
    name: ROS2 Input Integration
    needs:
      - rust_fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ROS2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install ROS2 interface packages
        run: sudo apt-get update && sudo apt-get install -y ros-jazzy-example-interfaces ros-jazzy-test-msgs
      - name: Build ROS2 bridge binary
        shell: bash
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          export AMENT_PYTHON_EXECUTABLE="${AMENT_PYTHON_EXECUTABLE:-python3}"
          source /opt/ros/jazzy/setup.bash
          cargo build --profile ci --no-default-features --features ros2
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - uses: ./.github/actions/ros2-input-smoke
        with:
          bridge_binary: ./target/ci/reduct-bridge

  coverage:
    name: Generate Code Coverage
    needs:
      - rust_fmt
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
        target: [ x86_64-unknown-linux-gnu ]
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_LOG: debug
    steps:
      - uses: actions/checkout@v4
      - name: Install ROS2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install ROS2 interface packages
        run: sudo apt-get update && sudo apt-get install -y ros-jazzy-example-interfaces ros-jazzy-test-msgs

      - uses: ./.github/actions/coverage
        with:
          os: ${{ matrix.os }}
          target: ${{ matrix.target }}
          action_github_token: ${{ secrets.ACTION_GITHUB_TOKEN }}
          cargo-args: --no-default-features --features ci,all-inputs
          ros-setup-script: /opt/ros/jazzy/setup.bash

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}


  build_test_docker_image:
    name: Build Docker image
    runs-on: ubuntu-22.04
    needs:
      - rust_fmt
      - build_binaries
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-docker
        with:
          platform: linux/amd64
          target: x86_64-unknown-linux-gnu
          image_artifact_name: image-linux-amd64
          image_tag: ${{ github.repository }}

      - name: Upload default image artifact (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: image
          path: /tmp/image.tar

  check_tag:
    runs-on: ubuntu-latest
    name: Check tag
    steps:
      - uses: actions/checkout@v4
      - name: Check tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="reduct-bridge") | .version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not resolve package version for reduct-bridge"
            exit 1
          fi
          echo "Version in Cargo.toml: $version"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version v${version}"
            exit 1
          fi

  make_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - check_tag # Only publish on tags
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    name: Make release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: softprops/action-gh-release@v2
        id: create_release
        with:
          draft: true
          prerelease: false
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: Copy changes from CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

  upload_release:
    runs-on: ubuntu-latest
    needs:
      - make_release
      - build_binaries
    permissions:
      contents: write
    name: Upload artifacts
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        target: [
          "x86_64-unknown-linux-gnu",
          "aarch64-unknown-linux-gnu",
          "x86_64-pc-windows-gnu",
          "x86_64-apple-darwin",
          "aarch64-apple-darwin",
          "armv7-unknown-linux-gnueabihf"
        ]
    steps:
      - uses: actions/checkout@v4
      - name: Download ${{ matrix.target }} artifact
        uses: actions/download-artifact@v4
        with:
          name: reduct-bridge-${{ matrix.target }}
          path: /tmp/
      - name: Archive binary for UNIX
        if: ${{ matrix.target != 'x86_64-pc-windows-gnu' }}
        run: |
          cd /tmp
          tar -czvf reduct-bridge.${{ matrix.target }}.tar.gz reduct-bridge

      - name: Archive binary for Windows
        if: ${{ matrix.target == 'x86_64-pc-windows-gnu' }}
        run: |
          cd /tmp
          zip -o reduct-bridge.${{ matrix.target }}.zip reduct-bridge.exe


      - name: Upload Linux Unix artifact
        if: ${{ matrix.target != 'x86_64-pc-windows-gnu' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ needs.make_release.outputs.upload_url }}
          asset_path: /tmp/reduct-bridge.${{ matrix.target }}.tar.gz
          asset_name: reduct-bridge.${{ matrix.target }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Windows artifact
        if: ${{ matrix.target == 'x86_64-pc-windows-gnu' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ needs.make_release.outputs.upload_url }}
          asset_path: /tmp/reduct-bridge.${{ matrix.target }}.zip
          asset_name: reduct-bridge.${{ matrix.target }}.zip
          asset_content_type: application/zip

  push_image_dockerhub:
    runs-on: ubuntu-latest
    name: Build image and push it to DockerHub Registry
    needs:
      - check_tag
      - build_binaries
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            cargo_target: x86_64-unknown-linux-gnu
            gcc_compiler: gcc-11
            digest: linux-amd64
          - platform: linux/arm64
            cargo_target: aarch64-unknown-linux-gnu
            gcc_compiler: gcc-aarch64-linux-gnu
            digest: linux-arm64
          - platform: linux/arm/v7
            cargo_target: armv7-unknown-linux-gnueabihf
            gcc_compiler: gcc-arm-linux-gnueabihf
            digest: linux-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build and push Docker image to GitHub repo
        id: build
        uses: ./.github/actions/build-docker
        with:
          platform: ${{ matrix.platform }}
          target: ${{ matrix.cargo_target }}
          image_tag: ${{ env.REGISTRY_IMAGE }}
          docker_labels: ${{ steps.meta.outputs.labels }}
          upload_artifact: 'false'
          build_outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.digest }}
          path: /tmp/digests/
          if-no-files-found: error
          retention-days: 1

  merge_digests:
    name: Merge digests and create manifest list
    runs-on: ubuntu-latest
    needs:
      - push_image_dockerhub
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests

      - name: Merge digests
        run: |
          mkdir -p /tmp/merged_digests
          find /tmp/digests -type f -print0 | xargs -0 mv -t /tmp/merged_digests
          ls /tmp/merged_digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY_IMAGE }}
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/merged_digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}



