name: Build, Test and Release
on:
  push:
    branches: [ main, stable ]
    tags:
      - "v*"
    paths-ignore:
      - docs/**
      - README.md
      - CHANGELOG.md

  pull_request:
    paths-ignore:
      - docs/**
      - README.md
      - CHANGELOG.md

permissions:
  id-token: write
  contents: read


env:
  REGISTRY_IMAGE: reduct/bridge
  AWS_LC_SYS_USE_PREBUILT: 0
  ROS2_CACHE_VERSION: v1

jobs:
  rust_fmt:
    runs-on: ubuntu-latest
    name: Rust Linter
    steps:
      - uses: actions/checkout@v4
      - name: Check code
        run: cargo fmt --all -- --check

  build_binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs:
      - rust_fmt
    strategy:
      matrix:
        include:
          - artifact_prefix: "bridge-ros1"
            target: "x86_64-unknown-linux-gnu"
            os: ubuntu-22.04
            compiler: "gcc"
            cargo_args: "--no-default-features --features shell,ros1"
            ros_distro: ""
            ros_setup_script: ""
          - artifact_prefix: "bridge-ros2-jazzy"
            target: "x86_64-unknown-linux-gnu"
            os: ubuntu-24.04
            compiler: "gcc"
            cargo_args: "--no-default-features --features shell,ros2,metrics"
            ros_distro: "jazzy"
            ros_setup_script: "/opt/ros/jazzy/setup.bash"
          - artifact_prefix: "bridge-ros2-humble"
            target: "x86_64-unknown-linux-gnu"
            os: ubuntu-22.04
            compiler: "gcc"
            cargo_args: "--no-default-features --features shell,ros2,metrics"
            ros_distro: "humble"
            ros_setup_script: "/opt/ros/humble/setup.bash"
    steps:
      - uses: actions/checkout@v4
      - name: Restore ROS2 cache
        if: ${{ matrix.ros_setup_script != '' }}
        id: ros2-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            /opt/ros/${{ matrix.ros_distro }}
            /etc/apt/sources.list.d/ros2.list
            /usr/share/keyrings/ros-archive-keyring.gpg
          key: ros2-${{ env.ROS2_CACHE_VERSION }}-${{ matrix.os }}-${{ matrix.ros_distro }}
      - name: Install ROS2
        if: ${{ matrix.ros_setup_script != '' && steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}
      - name: Install ROS2 interface packages
        if: ${{ matrix.ros_setup_script != '' && steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ros-${{ matrix.ros_distro }}-example-interfaces ros-${{ matrix.ros_distro }}-test-msgs
      - name: Save ROS2 cache
        if: ${{ matrix.ros_setup_script != '' && steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            /opt/ros/${{ matrix.ros_distro }}
            /etc/apt/sources.list.d/ros2.list
            /usr/share/keyrings/ros-archive-keyring.gpg
          key: ros2-${{ env.ROS2_CACHE_VERSION }}-${{ matrix.os }}-${{ matrix.ros_distro }}
      - uses: ./.github/actions/build-binaries
        with:
          minimal_rust_version: ${{ vars.MINIMAL_RUST_VERSION || 'stable' }}
          action_github_token: ${{ secrets.ACTION_GITHUB_TOKEN }}
          artifact-prefix: ${{ matrix.artifact_prefix }}
          target: ${{ matrix.target }}
          os: ${{ matrix.os }}
          compiler: ${{ matrix.compiler }}
          access-key-id: ${{ secrets.S3_CACHE_ACCESS_KEY }}
          secret-access-key: ${{ secrets.S3_CACHE_SECRET_KEY }}
          cargo-args: ${{ matrix.cargo_args }}
          ros-setup-script: ${{ matrix.ros_setup_script }}

  unit_tests:
    name: Run Unit Tests
    needs:
      - rust_fmt
      - build_binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_prefix: "bridge-ros1"
            os: ubuntu-22.04
            ros_distro: ""
            ros_setup_script: ""
          - artifact_prefix: "bridge-ros2-jazzy"
            os: ubuntu-24.04
            ros_distro: "jazzy"
            ros_setup_script: "/opt/ros/jazzy/setup.bash"
          - artifact_prefix: "bridge-ros2-humble"
            os: ubuntu-22.04
            ros_distro: "humble"
            ros_setup_script: "/opt/ros/humble/setup.bash"
    timeout-minutes: 10
    env:
      RUST_BACKTRACE: 1
      RUST_LOG: debug
    steps:
      - uses: actions/checkout@v4
      - name: Restore ROS2 cache
        if: ${{ matrix.ros_setup_script != '' }}
        id: ros2-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            /opt/ros/${{ matrix.ros_distro }}
            /etc/apt/sources.list.d/ros2.list
            /usr/share/keyrings/ros-archive-keyring.gpg
          key: ros2-${{ env.ROS2_CACHE_VERSION }}-${{ matrix.os }}-${{ matrix.ros_distro }}
      - name: Install ROS2
        if: ${{ matrix.ros_setup_script != '' && steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}
      - name: Install ROS2 interface packages
        if: ${{ matrix.ros_setup_script != '' && steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ros-${{ matrix.ros_distro }}-example-interfaces ros-${{ matrix.ros_distro }}-test-msgs
      - name: Download test artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-tests-x86_64-unknown-linux-gnu
          path: ./tmp/tests
      - uses: ./.github/actions/unit-tests
        with:
          os: ${{ matrix.os }}
          target: x86_64-unknown-linux-gnu
          ros-setup-script: ${{ matrix.ros_setup_script }}

  ros1_input_integration:
    name: ROS1 Input Integration
    needs:
      - rust_fmt
      - build_binaries
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Download reduct-bridge Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-ros1-x86_64-unknown-linux-gnu
          path: ./tmp/reduct-bridge

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: ./.github/actions/ros1-input-smoke
        with:
          bridge_binary: ./tmp/reduct-bridge/reduct-bridge

  shell_input_integration:
    name: Shell Input Integration
    needs:
      - rust_fmt
      - build_binaries
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Download reduct-bridge Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-ros1-x86_64-unknown-linux-gnu
          path: ./tmp/reduct-bridge

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: ./.github/actions/shell-input-smoke
        with:
          bridge_binary: ./tmp/reduct-bridge/reduct-bridge

  ros2_input_integration:
    name: ROS2 Input Integration
    needs:
      - rust_fmt
      - build_binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_prefix: "bridge-ros2-jazzy"
            os: ubuntu-24.04
            ros_distro: "jazzy"
            ros_setup_script: "/opt/ros/jazzy/setup.bash"
          - artifact_prefix: "bridge-ros2-humble"
            os: ubuntu-22.04
            ros_distro: "humble"
            ros_setup_script: "/opt/ros/humble/setup.bash"
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Restore ROS2 cache
        id: ros2-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            /opt/ros/${{ matrix.ros_distro }}
            /etc/apt/sources.list.d/ros2.list
            /usr/share/keyrings/ros-archive-keyring.gpg
          key: ros2-${{ env.ROS2_CACHE_VERSION }}-${{ matrix.os }}-${{ matrix.ros_distro }}
      - name: Install ROS2
        if: ${{ steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}
      - name: Install ROS2 interface packages
        if: ${{ steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ros-${{ matrix.ros_distro }}-example-interfaces ros-${{ matrix.ros_distro }}-test-msgs
      - name: Download reduct-bridge Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-x86_64-unknown-linux-gnu
          path: ./tmp/reduct-bridge
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - uses: ./.github/actions/ros2-input-smoke
        with:
          bridge_binary: ./tmp/reduct-bridge/reduct-bridge
          ros-setup-script: ${{ matrix.ros_setup_script }}

  coverage:
    name: Generate Code Coverage
    needs:
      - rust_fmt
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_LOG: debug
    steps:
      - uses: actions/checkout@v4
      - name: Restore ROS2 cache
        id: ros2-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            /opt/ros/jazzy
            /etc/apt/sources.list.d/ros2.list
            /usr/share/keyrings/ros-archive-keyring.gpg
          key: ros2-${{ env.ROS2_CACHE_VERSION }}-ubuntu-24.04-jazzy
      - name: Install ROS2
        if: ${{ steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install ROS2 interface packages
        if: ${{ steps.ros2-cache-restore.outputs.cache-hit != 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ros-jazzy-example-interfaces ros-jazzy-test-msgs

      - uses: ./.github/actions/coverage
        with:
          os: ubuntu-24.04
          target: x86_64-unknown-linux-gnu
          action_github_token: ${{ secrets.ACTION_GITHUB_TOKEN }}
          cargo-args: --no-default-features --features ci,all-inputs
          ros-setup-script: /opt/ros/jazzy/setup.bash

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}


  build_test_docker_image:
    name: Build Docker image
    runs-on: ubuntu-22.04
    needs:
      - rust_fmt
      - build_binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_artifact_name: image-ros1-linux-amd64
            bridge_artifact_name: bridge-ros1-x86_64-unknown-linux-gnu
            image_tag: reduct/bridge:ros1-test
          - image_artifact_name: image-ros2-jazzy-linux-amd64
            bridge_artifact_name: bridge-ros2-jazzy-x86_64-unknown-linux-gnu
            image_tag: reduct/bridge:ros2-jazzy-test
          - image_artifact_name: image-ros2-humble-linux-amd64
            bridge_artifact_name: bridge-ros2-humble-x86_64-unknown-linux-gnu
            image_tag: reduct/bridge:ros2-humble-test
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-docker
        with:
          platform: linux/amd64
          target: x86_64-unknown-linux-gnu
          bridge_artifact_name: ${{ matrix.bridge_artifact_name }}
          image_artifact_name: ${{ matrix.image_artifact_name }}
          image_tag: ${{ matrix.image_tag }}

  all_tests_passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - ros1_input_integration
      - ros2_input_integration
      - shell_input_integration
    steps:
      - name: Confirm all test jobs passed
        run: echo "All unit and integration tests passed"

  check_tag:
    runs-on: ubuntu-latest
    name: Check tag
    steps:
      - uses: actions/checkout@v4
      - name: Check tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="reduct-bridge") | .version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not resolve package version for reduct-bridge"
            exit 1
          fi
          echo "Version in Cargo.toml: $version"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match version v${version}"
            exit 1
          fi

  make_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - check_tag # Only publish on tags
      - all_tests_passed
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    name: Make release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: softprops/action-gh-release@v2
        id: create_release
        with:
          draft: true
          prerelease: false
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: Copy changes from CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ github.token }}

  upload_release:
    runs-on: ubuntu-latest
    needs:
      - make_release
      - build_binaries
    permissions:
      contents: write
    name: Upload artifacts
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - artifact_name: bridge-ros1-x86_64-unknown-linux-gnu
            asset_name: bridge-ros1.x86_64-unknown-linux-gnu.tar.gz
          - artifact_name: bridge-ros2-jazzy-x86_64-unknown-linux-gnu
            asset_name: bridge-ros2-jazzy.x86_64-unknown-linux-gnu.tar.gz
          - artifact_name: bridge-ros2-humble-x86_64-unknown-linux-gnu
            asset_name: bridge-ros2-humble.x86_64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v4
      - name: Download ${{ matrix.artifact_name }} artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp/
      - name: Archive binary
        run: |
          cd /tmp
          tar -czvf ${{ matrix.asset_name }} reduct-bridge

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ needs.make_release.outputs.upload_url }}
          asset_path: /tmp/${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/gzip

  push_image_dockerhub:
    runs-on: ubuntu-latest
    name: Build image and push it to DockerHub Registry
    needs:
      - check_tag
      - build_binaries
      - all_tests_passed
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            cargo_target: x86_64-unknown-linux-gnu
            bridge_artifact_name: bridge-ros1-x86_64-unknown-linux-gnu
            image_name: reduct/bridge
            image_suffix: ros1
          - platform: linux/amd64
            cargo_target: x86_64-unknown-linux-gnu
            bridge_artifact_name: bridge-ros2-jazzy-x86_64-unknown-linux-gnu
            image_name: reduct/bridge
            image_suffix: ros2-jazzy
          - platform: linux/amd64
            cargo_target: x86_64-unknown-linux-gnu
            bridge_artifact_name: bridge-ros2-humble-x86_64-unknown-linux-gnu
            image_name: reduct/bridge
            image_suffix: ros2-humble

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ matrix.image_suffix }}-${{ github.ref_name }}

      - name: Build and push Docker image to GitHub repo
        id: build
        uses: ./.github/actions/build-docker
        with:
          platform: ${{ matrix.platform }}
          target: ${{ matrix.cargo_target }}
          bridge_artifact_name: ${{ matrix.bridge_artifact_name }}
          image_tag: ${{ matrix.image_name }}
          docker_labels: ${{ steps.meta.outputs.labels }}
          upload_artifact: 'false'
          build_outputs: type=image,name=${{ matrix.image_name }},push=true

  snap_release:
    name: Build and Publish Snap Package
    runs-on: ubuntu-22.04
    needs:
      - all_tests_passed
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false
      matrix:
        variant: [ros1, ros2]
    steps:
      - uses: actions/checkout@v4
      - id: snap
        uses: ./.github/actions/snap-release
        with:
          variant: ${{ matrix.variant }}
      - name: Check Snapcraft credentials
        id: snapcraft-creds
        shell: bash
        run: |
          if [ -n "${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish snap package
        if: ${{ steps.snapcraft-creds.outputs.available == 'true' }}
        uses: snapcore/action-publish@master
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.snap_file }}
          release: ${{ startsWith(github.ref, 'refs/tags/') && 'stable' || 'edge' }}
