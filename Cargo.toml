[package]
name = "reduct-bridge"
version = "0.1.0"
edition = "2024"


[features]
default = ["ros1", "shell"]
ros1 = []
shell = []


[dependencies]
tokio = { version = "1.49.0", features = ["macros", "rt", "signal", "sync", "time"] }
async-trait = "0.1.89"
toml = "1.0.3+spec-1.1.0"
serde = { version = "1.0.228", features = ["derive"] }
bytes = "1.11.1"
reduct-rs = { version = "1.19.0", path = "../reduct-rs" }
anyhow = "1.0.102"
log = "0.4.28"
env_logger = "0.11.8"
regex = "1.12.2"
serde_json = "1.0.145"
rosrust = "0.9.12"
