[[remotes.reduct]]
name = "local"
url = "http://localhost:8333"
token_api = "***"
bucket = "my-bucket"
prefix = "ros_data/"


[[pipelines.ros1]]
name = "telemetry"
include_topics = ["/camera/*", "/lidar/points"]
exclude_topics = ["/camera/image_raw/compressed"]
remote = "local"
static_labels = {source = "ros1", robot = "alpha"}
dynamic_labels = { x-position = { source = "/odom/pose/position/x", scope = "*" } }