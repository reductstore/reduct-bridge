[[remotes.reduct]]
name = "local"
url = "http://localhost:8383"
token_api = "***"
bucket = "my-bucket"
prefix = "ros_data/"


[[inputs.ros]]
name = "ros-local"
uri = "http://localhost:11311"
node_name = "reduct-bridge"


[[inputs.shell]]
name = "shell-timestamp"
repeat_interval = 10
command = "echo \"Time: $(date --rfc-3339=ns)\""
entry_name = "time"
content_type = "text/plain"
labels = [
    { regex = "Time: (.*)", labels = [ "timestamp" ] },
    { static = { source = "shell_command" } }
]

[[inputs.shell]]
name = "shell-echo"
repeat_interval = 15
command = "echo \"Hello from shell pipeline!\""
entry_name = "echo"
content_type = "text/plain"


[[pipelines]]
name = "telemetry"
remote = "local"
inputs = ["ros-local"]


[[pipelines]]
name = "shell_pipeline"
remote = "local"
inputs = [ "shell-timestamp", "shell-echo" ]
labels = [
    { static = { source = "shell_pipeline"},  to = "*"  },
    { from = "time", labels = [ "timestamp" ], to = "echo" }
]
