# ReductStore remote destination.
[[remotes.reduct]]
# Unique remote name referenced by pipelines.<name>.remote.
name = "local"
# ReductStore base URL.
url = "http://localhost:8383"
# API token used for authentication.
token_api = "***"
# Target bucket for all records from this remote.
bucket = "my-bucket"
# Required key prefix inside the bucket.
prefix = ""


# MQTT v5 input configuration.
# Structure: [inputs.mqtt.<input_name>]
[inputs.mqtt.main]
broker = "mqtts://broker.example.com:8883"
client_id = "reduct-bridge"
version = "v5"

topics = ["factory/+/telemetry", "factory/+/events"]
qos = 1

username = "bridge"
password = "${MQTT_PASSWORD}"

entry_prefix = "/mqtt"

[inputs.mqtt.main.labels]
device = "$.device_id"
site = "$.site"
static_source = "mqtt"

[inputs.mqtt.main.property_labels]
reply = "response_topic"
mime = "content_type"
correlation = "correlation_data"
tenant = "user.tenant"


# MQTT v3 input configuration.
[inputs.mqtt.legacy]
broker = "mqtt://broker.example.com:1883"
client_id = "reduct-bridge-legacy"
version = "v3"

topics = ["legacy/+/data"]
qos = 0

username = "legacy_user"
password = "${LEGACY_MQTT_PASSWORD}"

entry_prefix = "/mqtt"

[inputs.mqtt.legacy.labels]
line = "$.line"
static_source = "mqtt-v3"


# Pipelines
[pipelines.mqtt_v5_pipeline]
remote = "local"
inputs = ["main"]

[pipelines.mqtt_v3_pipeline]
remote = "local"
inputs = ["legacy"]
